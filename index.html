<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lbe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <aside id="panel">
      <div class="logo">lbe</div>

      <div id="palette-section">
        <div class="section-label">Characters</div>
        <div id="palette-wrap">
          <div id="palette-grid"></div>
        </div>
      </div>

      <div id="colour-section">
        <div class="section-label">Colour</div>
        <div id="colour-grid"></div>
      </div>

      <div id="font-section">
        <div class="section-label">Font</div>
        <select id="font-select"></select>
      </div>

      <div id="canvas-section">
        <div class="section-label">Canvas</div>
        <div class="panel-row">
          <label>W</label>
          <input id="canvas-w" type="number" min="1" max="256" value="64" />
          <label>H</label>
          <input id="canvas-h" type="number" min="1" max="256" value="32" />
          <button id="canvas-apply">Apply</button>
        </div>
        <div class="panel-row">
          <button id="canvas-del-row">Del Row</button>
          <button id="canvas-del-col">Del Col</button>
        </div>
      </div>

      <div id="meta-section">
        <div class="section-label">Info</div>
        <div class="panel-row"><label>Title</label></div>
        <div class="panel-row"><input id="meta-title"  type="text" placeholder="Untitled" /></div>
        <div class="panel-row"><label>Artist</label></div>
        <div class="panel-row"><input id="meta-artist" type="text" /></div>
        <div class="panel-row"><label>Group</label></div>
        <div class="panel-row"><input id="meta-group"  type="text" /></div>
      </div>

      <div id="file-section">
        <div class="section-label">File</div>
        <div class="panel-row">
          <button id="btn-new">New</button>
          <button id="btn-save">Save</button>
          <button id="btn-save-as">Save As</button>
          <button id="btn-load">Load</button>
        </div>
        <input id="file-input" type="file" accept=".lbe,.json" />

        <div class="section-label" style="margin-top:10px">Export</div>
        <div class="panel-row">
          <label>Tile px</label>
          <input id="export-tile-size" type="number" value="16" min="1" max="256" />
          <span id="export-size-label">1024 × 512 px</span>
        </div>
        <div class="panel-row">
          <button id="btn-export-png">Export PNG</button>
        </div>
      </div>

      <div id="cmp-section">
        <div class="section-label">Comparison Buffer</div>
        <div class="panel-row">
          <label>Size</label>
          <input id="cmp-size" type="number" min="8" max="128" value="32" />
          <label>px &nbsp; Tol.</label>
          <input id="cmp-tol" type="number" min="1" max="50" value="10" />
          <label>%</label>
        </div>
        <div class="panel-row">
          <button id="cmp-rebuild">Rebuild</button>
          <span id="cmp-status">–</span>
        </div>
      </div>

    </aside>

    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <div id="status">
    <span id="st-mode">TILE | BOTH</span>
    <span id="st-zoom">zoom 1×</span>
    <span id="st-pos">0, 0</span>
    <span id="st-tile">tile 00</span>
    <span><span id="st-fg-swatch"></span><span id="st-fg-name">white</span></span>
    <span><span id="st-bg-swatch"></span><span id="st-bg-name">black</span></span>
    <span id="st-grid">64 × 32</span>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
