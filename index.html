<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untitled — Sigils</title>
  <link rel="stylesheet" href="style.css" />

  <link rel="icon" type="image/png" href="/fav/favicon-96x96.png?v=20260530" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/fav/favicon.svg?v=20260530" />
  <link rel="shortcut icon" href="/fav/favicon.ico?v=20260530" />
  <link rel="apple-touch-icon" sizes="180x180" href="/fav/apple-touch-icon.png?v=20260530" />
  <meta name="apple-mobile-web-app-title" content="Sigils" />
  <link rel="manifest" href="/fav/site.webmanifest?v=20260530" />
</head>
<body>
  <div id="app">

    <aside id="panel">
      <div id="panel-resize"></div>

      <!-- FILE -->
      <details id="file-section" open>
        <summary>File</summary>
        <div class="section-body">
          <div class="panel-row">
            <button id="btn-new">New</button>
            <button id="btn-save">Save</button>
            <button id="btn-save-as">Save As</button>
            <button id="btn-load">Load</button>
          </div>
          <input id="file-input" type="file" accept=".lbe,.json" style="display:none" />
        </div>
      </details>

      <!-- INFO -->
      <details id="meta-section" open>
        <summary>Info</summary>
        <div class="section-body">
          <div class="input-grid">
            <label>Title</label>
            <input id="meta-title"  type="text" placeholder="Untitled" />
            <label>Artist</label>
            <input id="meta-artist" type="text" />
            <label>Group</label>
            <input id="meta-group"  type="text" />
          </div>
        </div>
      </details>

      <!-- EDIT -->
      <details id="edit-section" open>
        <summary>Edit</summary>
        <div class="section-body">

          <!-- Canvas size -->
          <div class="subsection-label">Canvas</div>
          <div class="panel-row">
            <label>W</label>
            <input id="canvas-w" type="number" min="1" max="256" value="64" />
            <label>H</label>
            <input id="canvas-h" type="number" min="1" max="256" value="32" />
            <button id="canvas-apply">Apply</button>
            <button id="btn-clear">Clear</button>
          </div>
          <div class="panel-row">
            <button id="canvas-add-row-before">↑ Row</button>
            <button id="canvas-add-row-after">↓ Row</button>
            <button id="canvas-del-row">✕ Row</button>
          </div>
          <div class="panel-row">
            <button id="canvas-add-col-before">← Col</button>
            <button id="canvas-add-col-after">→ Col</button>
            <button id="canvas-del-col">✕ Col</button>
          </div>

          <!-- Mode -->
          <div class="subsection-label">Mode</div>
          <div class="panel-row">
            <div class="btn-group" id="mode-group">
              <button id="btn-mode-tile"  class="active">Tile</button>
              <button id="btn-mode-type">Type</button>
            </div>
          </div>

          <!-- Write mode -->
          <div class="subsection-label">Write</div>
          <div class="panel-row">
            <div class="btn-group" id="write-group">
              <button id="btn-write-both"   class="active">Both</button>
              <button id="btn-write-char">Char</button>
              <button id="btn-write-colour">Colour</button>
            </div>
          </div>

          <!-- View -->
          <div class="subsection-label">View</div>
          <div class="panel-row">
            <button id="btn-toggle-grid" class="active">Grid</button>
          </div>

          <!-- Font -->
          <div class="subsection-label">Font</div>
          <div class="panel-row">
            <select id="font-select"></select>
          </div>

          <!-- Characters -->
          <div class="subsection-label">Characters</div>
          <div id="palette-wrap">
            <div id="palette-grid"></div>
          </div>

          <!-- Colours -->
          <div class="subsection-label">Colours</div>
          <div id="colour-grid"></div>

          <!-- Comparison buffer (nested, collapsed) -->
          <details id="cmp-section">
            <summary>Comparison Buffer</summary>
            <div class="section-body">
              <div class="panel-row">
                <label>Size px</label>
                <input id="cmp-size" type="number" min="8" max="128" value="32" />
                <label>Tol. %</label>
                <input id="cmp-tol"  type="number" min="1" max="50"  value="10" />
              </div>
              <div class="panel-row">
                <button id="cmp-rebuild">Rebuild</button>
                <span id="cmp-status">–</span>
              </div>
            </div>
          </details>

          <!-- Reference image (nested, collapsed) -->
          <details id="ref-section">
            <summary>Reference Image</summary>
            <div class="section-body">
              <div class="panel-row">
                <button id="btn-ref-visible" class="active">Show</button>
                <button id="btn-ref-edit">Edit (P)</button>
              </div>
              <div class="panel-row">
                <input id="ref-url" type="text" placeholder="https://…" style="flex:1;min-width:0" />
                <button id="btn-ref-url">Load</button>
              </div>
              <div class="panel-row">
                <button id="btn-ref-upload">Upload</button>
                <input id="ref-file-input" type="file" accept="image/*" style="display:none" />
              </div>
              <div class="panel-row">
                <label>Opacity</label>
                <input id="ref-opacity" type="range" min="0" max="100" step="1" value="50" style="flex:1" />
              </div>
              <div class="panel-row">
                <label>Scale</label>
                <span id="ref-scale-label">100%</span>
                <span class="dim">(I/K to adjust)</span>
              </div>
            </div>
          </details>

        </div>
      </details>

      <!-- EXPORT -->
      <details id="export-section" open>
        <summary>Export</summary>
        <div class="section-body">
          <div class="panel-row">
            <label>Tile px</label>
            <input id="export-tile-size" type="number" value="16" min="1" max="256" />
            <span id="export-size-label">1024 × 512 px</span>
          </div>
          <div class="panel-row">
            <button id="btn-export-png">Export PNG</button>
            <button id="btn-export-png-transparent">Transparent</button>
          </div>
        </div>
      </details>

    </aside>

    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <div id="status">
    <span id="st-mode">TILE | BOTH</span>
    <span id="st-zoom">zoom 1×</span>
    <span id="st-pos">0, 0</span>
    <span id="st-tile">tile 00</span>
    <span><span id="st-fg-swatch"></span><span id="st-fg-name">white</span></span>
    <span><span id="st-bg-swatch"></span><span id="st-bg-name">black</span></span>
    <span id="st-grid">64 × 32</span>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
